{% extends "base.html" %}
{% block title %}Sign In — Bob{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card glass">
        <div class="auth-header">
            <div class="auth-icon">
                <span class="material-icons-round">security</span>
            </div>
            <h2>Bob Identity Trust</h2>
            <p>Sign in to access your risk dashboard</p>
        </div>

        <form class="auth-form" id="loginForm" action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <span class="material-icons-round">mail</span>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <span class="material-icons-round">lock</span>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-full mt-2">
                <span class="material-icons-round" style="font-size:17px">login</span>
                Sign In
            </button>
        </form>

        <div class="auth-footer">
            <small>Protected by behavioral risk analysis</small>
        </div>
    </div>
</div>
{% endblock %}
